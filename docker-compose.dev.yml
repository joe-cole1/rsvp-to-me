# Builds directly from the main branch on GitHub — no local clone needed.
# Useful for testing the latest code on any server.
#
# Usage:
#   cp .env.example .env   # fill in your secrets
#   docker compose -f docker-compose.dev.yml up --build -d
#
# To update to the latest main:
#   docker compose -f docker-compose.dev.yml up --build -d

services:
  app:
    build:
      context: https://github.com/joe-cole1/rsvp-to-me.git#main
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set a strong value in .env}@postgres:5432/rsvp_db
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong value in .env}@redis:6379
      OPEN_REGISTRATION: "false"
      SEED_TEST_DATA: "false"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/backups:/app/data/backups
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set a strong value in .env}
      POSTGRES_DB: rsvp_db
    volumes:
      - ./pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong value in .env}
    command:
      - sh
      - -c
      - 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'REDISCLI_AUTH="$$REDIS_PASSWORD" redis-cli ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
