# Builds directly from the main branch on GitHub — no local clone needed.
# Useful for testing the latest code on any server.
#
# Usage:
#   cp .env.example .env   # fill in your secrets
#   docker compose -f docker-compose.dev.yml up --build -d
#
# To update to the latest main:
#   docker compose -f docker-compose.dev.yml up --build -d

services:
  app:
    build:
      context: https://github.com/joe-cole1/rsvp-to-me.git#main
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres_password_here}@postgres:5432/rsvp_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_placeholder}@redis:6379
      OPEN_REGISTRATION: "false"
      SEED_TEST_DATA: "false"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_here}
      POSTGRES_DB: rsvp_db
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rsvp_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_placeholder}
    volumes:
      - ./redis_data:/data
