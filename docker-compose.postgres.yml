services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Ensure DATABASE_URL is set in your .env pointing to the postgres container
      # e.g., DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/rsvp_db?schema=public
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_placeholder}@redis:6379
      OPEN_REGISTRATION: "false"
      SEED_TEST_DATA: "false"
      CLOUDFLARE_WORKER_EMAIL_URL: ""
      CLOUDFLARE_WORKER_API_SECRET: ""
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_here}
      POSTGRES_DB: rsvp_db
    volumes:
      - ./pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rsvp_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_placeholder}
    volumes:
      - ./redis_data:/data
