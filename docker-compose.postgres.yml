services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Ensure DATABASE_URL is set in your .env pointing to the postgres container
      # e.g., DATABASE_URL=postgresql://postgres:postgres_password@postgres:5432/rsvp_db?schema=public
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      OPEN_REGISTRATION: "false"
      SEED_TEST_DATA: "false"
      CLOUDFLARE_WORKER_EMAIL_URL: ""
      CLOUDFLARE_WORKER_API_SECRET: ""
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  cron:
    build: .
    command: npx tsx scripts/cron.ts
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - app
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_here}
      POSTGRES_DB: rsvp_db
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
