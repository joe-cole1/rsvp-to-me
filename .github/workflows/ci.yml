name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

# Prevents concurrent runs from fighting over cache locks and wasting runner time
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rsvp_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache Playwright Browser
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-22-playwright-${{ hashFiles('package-lock.json') }}

      - name: Cache Next.js Build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4.3.0
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-node-22-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-node-22-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Format Prisma Schema
        run: npx prisma format

      - name: Fix formatting (Prettier)
        run: npx prettier --write .

      - name: Auto-fix Lint Errors
        run: npm run lint -- --fix || true

      - name: Commit automated fixes
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
        with:
          commit_message: "style/chore: automated formatting and lint fixes"

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rsvp_test

      - name: Strict Lint Check
        run: npm run lint

      - name: Unit Tests
        run: npm test
        env:
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rsvp_test
          REDIS_URL: redis://localhost:6379

      - name: Integration Tests
        run: npm run test:integration
        env:
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rsvp_test
          REDIS_URL: redis://localhost:6379

      - name: Component Tests
        run: npm run test:components
        env:
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rsvp_test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          HOST_INVITE_CODE: ci-test
          EMAIL_FROM: ci@example.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      # ---- E2E -----------------------------------------------------------------
      - name: Start Next.js server
        run: npm start &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rsvp_test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          HOST_INVITE_CODE: ci-test
          EMAIL_FROM: ci@example.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          OPEN_REGISTRATION: "true"

      - name: Install Playwright Chromium (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright System Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for server
        run: npx wait-on http://localhost:3000/api/health --timeout 60000

      - name: E2E Tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rsvp_test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
