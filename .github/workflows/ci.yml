name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39c5ae27583385e42f067f128c8d14d8724d9c34 # v4.2.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_URL: file:./ci.db

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./ci.db
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          HOST_INVITE_CODE: ci-test
          EMAIL_FROM: ci@example.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000
