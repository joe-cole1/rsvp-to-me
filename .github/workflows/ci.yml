name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./ci.db
          SESSION_SECRET: ci-placeholder-secret-must-be-at-least-32-chars
          HOST_INVITE_CODE: ci-test
          RESEND_API_KEY: ""
          EMAIL_FROM: ci@example.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000
