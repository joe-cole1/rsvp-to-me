services:
  app:
    build:
      context: .
      args:
        - DISABLE_HSTS=true
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set a strong value in .env}@postgres:5432/rsvp_db
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong value in .env}@redis:6379
      OPEN_REGISTRATION: "false"
      SEED_TEST_DATA: "true"
      DISABLE_HSTS: "true"
      CLOUDFLARE_WORKER_EMAIL_URL: ""
      CLOUDFLARE_WORKER_API_SECRET: ""
    volumes:
      - ./data:/app/data
    restart: on-failure:3
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - set a strong value in .env}
      POSTGRES_DB: rsvp_db
    volumes:
      - ./pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rsvp_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required - set a strong value in .env}
    volumes:
      - ./redis_data:/data
