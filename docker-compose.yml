services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: file:/app/data/prod.db
      OPEN_REGISTRATION: "false"
      SEED_TEST_DATA: "true"
      CLOUDFLARE_WORKER_EMAIL_URL: ""
      CLOUDFLARE_WORKER_API_SECRET: ""
      REDIS_URL: "" # e.g. redis://redis:6379
    volumes:
      - ./data:/app/data
    restart: unless-stopped
